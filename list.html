<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="./js/head-common.js"></script>
    <script src="./js/header.js"></script>

    <!-- swiper js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="./css/list.css">
    <script src="./js/listArray.js"></script>
    <script src="./js/listControl.js"></script>
    <script src="./js/include.js"></script>
    <script src="./js/heart.js"></script>
    <script src="./js/toWon.js"></script>
    <script src="./js/getParam.js"></script>
</head>
<body>
    <div id="include-header"></div>

    
    <main>

        <!-- 서브 배너 -->
        <div class="sub-banner">
            <div class="common-frame">
                <h1>Drink Menu</h1>
            </div>
        </div>

        <!-- 타이틀 -->
        <div class="title">
            <div class="common-frame">
                <h3>DAONCHA</h3>
                <p>다온의 모든 메뉴와 가격을 한눈에 확인하세요</p>
            </div>
        </div>

        <!-- 옵션 -->
        <div class="option">
            <div class="common-frame">
                <div class="total-view">
                    <span>Total</span>
                    <span id="current-count" class="fwb">8</span>
                </div>
                <div>
                    <select id="view-filter" class="b2">
                        <option value="정렬방식">정렬방식</option>
                        <option value="낮은 가격 순">낮은 가격 순</option>
                        <option value="높은 가격 순">높은 가격 순</option>
                        <option value="신상품">신상품</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 상품 리스트 -->
        <div class="list-wrap">
            <div class="common-frame">
                <ul class="list-grid">
                    <li>
                        <a href="./detail.html">
                            <figure>
                                <img src="./img/list-thumb-StrawberryWhiteTea.jpg" alt="딸기 화이트티">
                            </figure>
                            <div class="list-option">
                                <span class="btn-heart">
                                    <img src="./img/icn-heart.svg" alt="좋아요 아이콘">
                                </span>
                            </div>
                            <h4>딸기 화이트 티</h4>
                            <p class="fwm">달콤한 딸기와 산뜻한 화이트 티가 어우러져 가볍고 부드러운 봄의 풍미를 느낄 수 있는 티</p>
                            <div class="price fwb">6,300</div>
                        </a>
                    </li>
                    
                </ul>
            </div>
        </div>

    </main>

    <div id="include-footer"></div>
</body>
</html>
